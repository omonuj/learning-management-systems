[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    "migrations",
    "staticfiles",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"*/settings.py" = ["F403", "F405", "E402"]

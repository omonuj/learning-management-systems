name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  build:
    name: Build & collect static
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-insecure-build-key-not-for-production
      DEBUG: "False"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: staticfiles
          path: staticfiles/
          retention-days: 7

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      # --- Deployment scaffold ---------------------------------------------
      # Fill in for your host (Render / Railway / Fly.io / VPS + gunicorn).
      # Kept as a documented no-op so the pipeline is green until wired up.

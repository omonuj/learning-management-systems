name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, check & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-insecure-test-key-not-for-production
      DEBUG: "False"
      DATABASE_URL: postgres://lms:lms@localhost:5432/lms_test
      DB_NAME: lms_test
      DB_USER: lms
      DB_PASSWORD: lms
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Django system checks
        run: python manage.py check

      - name: Verify migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity 2
